services:
  sophia-proxy:
    image: nginx:1.27-alpine
    container_name: sophia-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-conf:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    networks:
      - net1

  certbot:
    image: certbot/certbot:latest
    container_name: sophia-certbot
    profiles: [certbot]
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot

networks:
  net1:
    external: true

volumes:
  certbot-conf:
  certbot-www:
